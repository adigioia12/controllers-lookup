<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controller Lookup</title>
  <meta name="description" content="Cerca un controller e visualizza ruolo e posizione (MASTER/MEMBER)." />
  <style>
    :root{
      --bg: #0f172a;              /* slate-900 */
      --card: #0b1224cc;          /* translucent */
      --text: #e5e7eb;            /* gray-200 */
      --muted: #94a3b8;           /* slate-400 */
      --accent: #60a5fa;          /* blue-400 */
      --accent-strong:#3b82f6;    /* blue-500 */
      --success:#22c55e;          /* green-500 */
      --warning:#f59e0b;          /* amber-500 */
      --danger:#ef4444;           /* red-500 */
      --surface:#0b1224;          /* deep surface */
      --ring:#93c5fd55;           /* focus ring */
      --chip:#1e293b;             /* slate-800 */
      --shadow: 0 10px 30px rgba(0,0,0,.35), 0 2px 10px rgba(0,0,0,.25);
    }

    @media (prefers-color-scheme: light) {
      :root{
        --bg: #f5f7fb;
        --surface:#ffffff;
        --card: #ffffffd9;
        --text: #0f172a;
        --muted: #64748b;
        --chip:#f1f5f9;
        --shadow: 0 10px 25px rgba(18, 32, 73, .08), 0 2px 8px rgba(18, 32, 73, .06);
      }
    }

    html, body {
      height: 100%;
      background: radial-gradient(1000px 800px at 20% 0%, #1e293b 0%, transparent 60%),
                  radial-gradient(1000px 800px at 80% 100%, #111827 0%, transparent 60%),
                  var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      margin: 0;
    }

    .container{
      max-width: 900px;
      margin: 0 auto;
      padding: 24px clamp(16px, 3vw, 32px) 48px;
      display: grid;
      gap: 18px;
      align-items: start;
    }

    header{
      margin-top: clamp(16px, 5vh, 64px);
      text-align: center;
    }

    h1{
      font-size: clamp(26px, 4.6vw, 40px);
      line-height: 1.1;
      margin: 0 0 8px 0;
      letter-spacing: -0.02em;
    }

    .sub{
      color: var(--muted);
      font-size: clamp(14px, 2.4vw, 16px);
      margin: 0 auto;
      max-width: 60ch;
    }

    .card{
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .search-section{ padding: 16px; }

    .search-box{
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid rgba(148,163,184,.25);
    }

    .search-box input{
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: clamp(16px, 2.8vw, 18px);
      padding: 12px 4px;
    }
    .search-box input::placeholder{ color: var(--muted); }

    .search-box button{
      display: inline-grid;
      place-items: center;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .08s ease, filter .2s ease;
    }
    .search-box button:hover{ filter: brightness(1.05); }
    .search-box button:active{ transform: translateY(1px) scale(.99); }
    .search-box button:focus-visible{ outline: 3px solid var(--ring); outline-offset: 2px; }

    .hints{
      display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 2px 2px 2px; color: var(--muted);
      font-size: 13px;
    }
    .chip{
      background: var(--chip);
      border: 1px solid rgba(148,163,184,.25);
      color: inherit;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: background .2s ease, transform .06s ease;
    }
    .chip:hover{ background: rgba(148,163,184,.15); }
    .chip:active{ transform: translateY(1px); }

    .results{
      margin-top: 12px;
      padding: 14px 16px 18px 16px;
      display: grid;
      gap: 12px;
    }

    .result-card{
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 12px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.02));
      display: grid; gap: 8px;
      animation: fadeIn .18s ease-out;
    }
    @keyframes fadeIn { from{opacity:0; transform: translateY(4px)} to{opacity:1; transform:none} }

    .title-row{
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }

    .badge{
      font-size: 12px; font-weight: 600; letter-spacing: .02em;
      padding: 4px 8px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid transparent; color: white;
    }
    .badge.master{ background: linear-gradient(135deg, #10b981, #059669); border-color: rgba(16,185,129,.5); }
    .badge.member{ background: linear-gradient(135deg, #f59e0b, #d97706); border-color: rgba(245,158,11,.5); }

    .kv{ display: grid; gap: 2px; }
    .kv .k{ color: var(--muted); font-size: 12px; }
    .kv .v{ font-size: 15px; }

    .not-found{
      border: 1px dashed rgba(148,163,184,.35);
      border-radius: 12px; padding: 14px 16px;
      color: var(--muted);
    }

    footer{
      margin-top: 16px; text-align: center; color: var(--muted); font-size: 12px;
    }
    footer a{ color: var(--accent-strong); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Controller Lookup</h1>
      <p class="sub">Inserisci il nome di un controller per sapere se è un <strong>MASTER</strong> o un <strong>MEMBER</strong> e dove si trovano i dispositivi coinvolti.</p>
    </header>

    <section class="card search-section" aria-label="Ricerca controller">
      <div class="search-box">
        <input id="query" type="text" inputmode="text" spellcheck="false" placeholder="Es. Controller1" aria-label="Nome controller" autofocus />
        <button id="searchBtn" title="Cerca" aria-label="Cerca">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M21 21l-4.35-4.35" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="11" cy="11" r="7" stroke="white" stroke-width="2"/>
          </svg>
        </button>
      </div>
      <div class="hints" aria-label="Suggerimenti">
        <span class="chip" data-fill="Controller1">Controller1</span>
        <span class="chip" data-fill="Controller2">Controller2</span>
        <span class="chip" data-fill="Controller3">Controller3</span>
      </div>
      <div id="results" class="results" aria-live="polite"></div>
    </section>

    <footer>
      <p>Per aggiungere nuovi controller, modifica l'oggetto <code>dataset</code> nello script inline.</p>
    </footer>
  </div>

  <script>
    // === Dataset iniziale (puoi estenderlo facilmente) ===
    // Nota: le chiavi sono normalizzate in minuscolo per ricerche case-insensitive
    const dataset = {
      "controller1": { role: "MASTER", location: "Roma — 1º piano, locale 5" },
      "controller2": { role: "MASTER", location: "Calabria" },
      "controller3": { role: "MEMBER", location: "Milano", master: "Controller2" }
    };

    // === Utility ===
    const norm = (s) => (s || "").trim().toLowerCase();

    function findSuggestions(term){
      const q = norm(term);
      if(!q) return [];
      const keys = Object.keys(dataset);
      // Semplice suggerimento: inizia con / include
      const starts = keys.filter(k => k.startsWith(q));
      const includes = keys.filter(k => !k.startsWith(q) && k.includes(q));
      return [...starts, ...includes].slice(0, 5).map(k => ({ key:k, label: properCase(k) }));
    }

    function properCase(key){
      // Ripristina capitalizzazione tipo "Controller3"
      return key.replace(/^(controller)(\d+)/i, (_, a, n) => a.charAt(0).toUpperCase() + a.slice(1).toLowerCase() + n);
    }

    function renderResult(raw){
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';

      const q = norm(raw);
      if(!q){
        resultsEl.innerHTML = `<div class="not-found">Inserisci un nome, ad esempio <strong>Controller1</strong>.</div>`;
        return;
      }

      const entry = dataset[q];
      if(!entry){
        const sugg = findSuggestions(q);
        resultsEl.innerHTML = `
          <div class="not-found">
            Nessun controller trovato per: <strong>${escapeHtml(raw)}</strong>.
            ${sugg.length ? `<div style="margin-top:8px">Forse cercavi: ${sugg.map(s => `<a class="chip" href="#${encodeURIComponent(s.label)}" data-suggest="${s.label}">${s.label}</a>`).join(' ')}</div>` : ''}
          </div>
        `;
        attachSuggestHandlers();
        return;
      }

      const title = properCase(q);

      // Costruisci la scheda risultato a seconda del ruolo
      if(entry.role === 'MASTER'){
        resultsEl.innerHTML = `
          <div class="result-card">
            <div class="title-row">
              <h2 style="margin:0">${title}</h2>
              <span class="badge master" title="Ruolo: MASTER">MASTER</span>
            </div>
            <div class="kv">
              <div class="k">Posizione</div>
              <div class="v">${escapeHtml(entry.location || '—')}</div>
            </div>
          </div>
        `;
      } else if(entry.role === 'MEMBER'){
        const masterName = entry.master || '';
        const masterKey = norm(masterName);
        const master = dataset[masterKey];
        resultsEl.innerHTML = `
          <div class="result-card">
            <div class="title-row">
              <h2 style="margin:0">${title}</h2>
              <span class="badge member" title="Ruolo: MEMBER">MEMBER</span>
            </div>
            <div class="kv">
              <div class="k">Master</div>
              <div class="v">${masterName ? `<a href="#${encodeURIComponent(masterName)}" data-suggest="${escapeHtml(masterName)}">${escapeHtml(masterName)}</a>` : '—'}</div>
            </div>
            <div class="kv">
              <div class="k">Posizione (Member)</div>
              <div class="v">${escapeHtml(entry.location || '—')}</div>
            </div>
            <div class="kv">
              <div class="k">Posizione (Master)</div>
              <div class="v">${escapeHtml((master && master.location) ? master.location : 'Non disponibile')}</div>
            </div>
          </div>
        `;
        attachSuggestHandlers();
      } else {
        resultsEl.innerHTML = `<div class="not-found">Il controller <strong>${escapeHtml(title)}</strong> ha un ruolo non riconosciuto.</div>`;
      }
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[s]));
    }

    function attachSuggestHandlers(){
      // Link suggeriti che riempiono la ricerca
      document.querySelectorAll('[data-suggest]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const val = el.getAttribute('data-suggest');
          document.getElementById('query').value = val;
          updateHash(val);
          renderResult(val);
        }, { once: true });
      });
    }

    function updateHash(v){
      const hash = '#' + encodeURIComponent(v);
      if(location.hash !== hash){
        history.replaceState(null, '', hash);
      }
    }

    // === Event wiring ===
    const input = document.getElementById('query');
    const btn = document.getElementById('searchBtn');

    btn.addEventListener('click', () => {
      const v = input.value;
      updateHash(v);
      renderResult(v);
    });

    input.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        const v = input.value;
        updateHash(v);
        renderResult(v);
      }
    });

    // Chip per autocompilare
    document.querySelectorAll('.chip[data-fill]').forEach(chip => {
      chip.addEventListener('click', () => {
        const v = chip.getAttribute('data-fill');
        input.value = v;
        updateHash(v);
        renderResult(v);
      });
    });

    // Caricamento da hash per link condivisibili (#Controller3)
    window.addEventListener('DOMContentLoaded', () => {
      const fromHash = decodeURIComponent((location.hash || '').replace(/^#/, ''));
      if(fromHash){
        input.value = fromHash;
        renderResult(fromHash);
      } else {
        renderResult('');
      }
    });
  </script>
</body>
</html>
